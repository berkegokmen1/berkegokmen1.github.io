      :root {

        --header-bg: rgba(255, 255, 255, 0.92); --max-width: 980px; --radius: 18px;
        color-scheme: light;
      }
      html.dark {
        --bg: #0f1117; --surface: #1a1d28; --text: #e4e6ee; --muted: #9ca0af;
        --accent: #5b8aff; --accent-soft: rgba(91, 138, 255, 0.15); --border: #2a2d3a;

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        background: var(--bg); color: var(--text); line-height: 1.7;
        -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover, a:focus-visible { text-decoration: underline; }
      .site-header {
        position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        backdrop-filter: blur(16px); background: var(--header-bg);
        border-bottom: 1px solid var(--border);
      }
      .site-header__inner {
        margin: 0 auto; max-width: var(--max-width); padding: 1.2rem 1.5rem;
        display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 1rem;
      }
      .brand { font-weight: 600; letter-spacing: 0.02em; }
      .nav-links {
        display: flex; align-items: center; justify-content: center;
        gap: 1.35rem; font-size: 0.96rem; font-weight: 500;
      }
      .nav-links a {
        color: var(--muted); padding-bottom: 0.22rem;
        border-bottom: 2px solid transparent; transition: border-color 0.2s ease, color 0.2s ease;
      }
      .nav-links a:hover, .nav-links a:focus-visible {
        color: var(--accent); border-color: var(--accent); text-decoration: none;
      }
      .nav-links a.active { color: var(--accent); border-color: var(--accent); }
      .theme-toggle {
        justify-self: end; display: inline-flex; align-items: center; justify-content: center;
        width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 50%;
        background: var(--surface); color: var(--muted); cursor: pointer;
        transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
      }
      .theme-toggle:hover { color: var(--accent); border-color: var(--accent); transform: scale(1.08); }
      .theme-toggle svg { width: 20px; height: 20px; transition: opacity 0.25s ease, transform 0.3s ease; }
      .theme-toggle .icon-sun { display: block; } .theme-toggle .icon-moon { display: none; }
      html.dark .theme-toggle .icon-sun { display: none; } html.dark .theme-toggle .icon-moon { display: block; }
      #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
      html.dark .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1); }
      html.dark .leaflet-control-zoom a { background: var(--card-bg); color: var(--text); border-color: var(--border); }
      .metro-legend {
        position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 1001;
        background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
        padding: 1rem 1.2rem; font-size: 0.82rem; color: var(--muted);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12); backdrop-filter: blur(16px);
        max-height: calc(100vh - 8rem); overflow-y: auto; min-width: 200px;
      }
      html.dark .metro-legend { box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4); }
      .metro-legend h3 {
        font-size: 0.74rem; font-weight: 700; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--text); margin-bottom: 0.7rem;
        cursor: pointer; user-select: none; transition: opacity 0.2s ease;
      }
      .metro-legend h3:hover { opacity: 0.6; }
      .metro-legend h3.group-dimmed { opacity: 0.35; }
      .legend-line {
        display: flex; align-items: center; gap: 0.6rem; padding: 0.3rem 0;
        cursor: pointer; transition: opacity 0.2s ease;
      }
      .legend-line:hover { opacity: 0.75; } .legend-line.dimmed { opacity: 0.3; }
      .legend-swatch { width: 28px; height: 4px; border-radius: 2px; flex-shrink: 0; }
      .legend-label { font-size: 0.8rem; font-weight: 500; color: var(--text); }
      .legend-route { font-size: 0.7rem; color: var(--muted); margin-left: auto; white-space: nowrap; }
      .legend-sep { border: none; border-top: 1px solid var(--border); margin: 0.5rem 0; }
      .legend-footer { font-size: 0.72rem; color: var(--muted); line-height: 1.4; margin-top: 0.3rem; }
      .station-tooltip {
        background: var(--card-bg) !important; color: var(--text) !important;
        border: 1px solid var(--border) !important; border-radius: 8px !important;
        padding: 0.4rem 0.7rem !important; font-family: "Inter", sans-serif !important;
        font-size: 0.82rem !important; font-weight: 600 !important;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12) !important; white-space: nowrap !important;
      }
      .station-tooltip .leaflet-tooltip-arrow { display: none; }
      .station-tooltip .tt-line { font-size: 0.7rem; font-weight: 500; opacity: 0.7; display: block; margin-top: 0.1rem; }
      @media (max-width: 600px) {

        .nav-links { grid-column: 1 / -1; grid-row: 2; width: 100%; justify-content: flex-start; }
        .theme-toggle { grid-column: 2; grid-row: 1; }
        .metro-legend { bottom: 0.6rem; left: 0.6rem; padding: 0.6rem 0.8rem; font-size: 0.75rem; max-height: calc(100vh - 6rem); min-width: 170px; }

          { name: "Zaharna Fabrika", lat: 42.6940, lng: 23.2920 },
          { name: "K. Velichkov", lat: 42.7080, lng: 23.2990 },
          { name: "Bul. Slivnitsa", lat: 42.7050, lng: 23.3050 },
          { name: "Tsentralna Gara", lat: 42.7115, lng: 23.3210 }
        ]},
        { id: "T23", name: "T23", type: "tram", route: "Druzhba 2 – Geo Milev", color: "#F4A460", stations: [
          { name: "Druzhba 2", lat: 42.6650, lng: 23.3980 },
          { name: "Druzhba", lat: 42.6530, lng: 23.3990 },
          { name: "Mladost 1", lat: 42.6560, lng: 23.3720 },
          { name: "G.M. Dimitrov", lat: 42.6780, lng: 23.3590 },
          { name: "Geo Milev", lat: 42.6990, lng: 23.3560 }
        ]},
        { id: "T27", name: "T27", type: "tram", route: "Manastirski Livadi – Sofia Sever", color: "#F4A460", stations: [
          { name: "Manastirski Livadi", lat: 42.6650, lng: 23.2900 },
          { name: "Bulgaria Blvd.", lat: 42.6790, lng: 23.2960 },
          { name: "NDK", lat: 42.6865, lng: 23.3190 },
          { name: "Pl. Makedoniya", lat: 42.6960, lng: 23.3220 },
          { name: "Lavov Most", lat: 42.7040, lng: 23.3230 },
          { name: "Tsentralna Gara", lat: 42.7115, lng: 23.3210 },
          { name: "Sofia Sever", lat: 42.7200, lng: 23.3280 }
        ]}
      ];

      const map = L.map("map", { center: [42.698, 23.322], zoom: 13, zoomControl: true, attributionControl: true });
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: "abcd", maxZoom: 19
      }).addTo(map);

      const lineLayers = {};
      metroLines.forEach((line) => {
        const group = L.layerGroup();
        const latlngs = line.stations.map((s) => [s.lat, s.lng]);
        const isTram = line.type === "tram";
        L.polyline(latlngs, { color: line.color, weight: isTram ? 3 : 4, opacity: isTram ? 0.7 : 0.9, lineJoin: "round", lineCap: "round" }).addTo(group);
        line.stations.forEach((station) => {
          const marker = L.circleMarker([station.lat, station.lng], {
            radius: isTram ? 3 : 4, fillColor: "#ffffff", fillOpacity: 1, color: line.color, weight: isTram ? 2 : 2.5, opacity: 1
          });
          marker.bindTooltip(`<span>${station.name}</span><span class="tt-line">${line.name}</span>`, {
            className: "station-tooltip", direction: "top", offset: [0, -8]
          });
          marker.addTo(group);
        });
        group.addTo(map);
        lineLayers[line.id] = { group, visible: true };
      });

      const legendEl = document.getElementById("legend");
      const groups = [
        { label: "Metro", type: "metro" },
        { label: "Tram", type: "tram" }
      ];
      // Tag metro lines
      metroLines.forEach(l => { if (!l.type) l.type = "metro"; });
      let html = '';
      groups.forEach((g, i) => {
        const lines = metroLines.filter(l => l.type === g.type);
        if (lines.length === 0) return;
        if (i > 0) html += '<hr class="legend-sep">';
        html += `<h3 data-group="${g.type}" title="Click to toggle all ${g.label} lines">${g.label}</h3>`;
        lines.forEach((line) => {
          html += `<div class="legend-line" data-line="${line.id}" data-type="${g.type}">
            <span class="legend-swatch" style="background:${line.color}"></span>
            <span class="legend-label">${line.name}</span>
            <span class="legend-route">${line.route}</span>
          </div>`;
        });
      });
      html += '<hr class="legend-sep">';
      html += '<div class="legend-footer">Click a line or group header to toggle.<br>Sofia Rail Network · 2025</div>';
      legendEl.innerHTML = html;

      // Individual line toggle
      legendEl.querySelectorAll(".legend-line").forEach((el) => {
        el.addEventListener("click", () => {
          const id = el.dataset.line;
          const entry = lineLayers[id];
          if (!entry) return;
          if (entry.visible) { map.removeLayer(entry.group); el.classList.add("dimmed"); }
          else { entry.group.addTo(map); el.classList.remove("dimmed"); }
          entry.visible = !entry.visible;
        });
      });

      // Group toggle
      legendEl.querySelectorAll("h3[data-group]").forEach((header) => {
        header.addEventListener("click", () => {
          const type = header.dataset.group;
          const lineEls = legendEl.querySelectorAll(`.legend-line[data-type="${type}"]`);
          const anyVisible = [...lineEls].some(el => !el.classList.contains("dimmed"));
          lineEls.forEach((el) => {
            const id = el.dataset.line;
            const entry = lineLayers[id];
            if (!entry) return;
            if (anyVisible) { map.removeLayer(entry.group); el.classList.add("dimmed"); entry.visible = false; }
            else { entry.group.addTo(map); el.classList.remove("dimmed"); entry.visible = true; }
          });
          header.classList.toggle("group-dimmed", anyVisible);
        });
      });
    </script>
  </body>
</html>
